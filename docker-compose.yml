services:
  mysql:
    image: mysql:8.4
    container_name: case-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-bd_casetecnico}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER:-casetecnico}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - case-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: case-backend
    working_dir: /app
    command: ["./gradlew", "bootRun"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-bd_casetecnico}
      DB_USER: ${DB_USER:-casetecnico}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_EXPIRATION_MS: ${APP_JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - case-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: case-frontend
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - case-net

networks:
  case-net:
    driver: bridge

volumes:
  mysql_data:

