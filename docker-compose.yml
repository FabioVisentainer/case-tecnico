services:
  mysql:
    image: mysql:8.4
    container_name: case-mysql
    environment:
      MYSQL_DATABASE: bd_casetecnico
      MYSQL_ROOT_PASSWORD: C@seTecn!co123
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pC@seTecn!co123"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - case-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: case-backend
    working_dir: /app
    command: ["./gradlew", "bootRun"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: bd_casetecnico
      DB_USER: root
      DB_PASSWORD: C@seTecn!co123
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - case-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: case-frontend
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - case-net

networks:
  case-net:
    driver: bridge

volumes:
  mysql_data:

