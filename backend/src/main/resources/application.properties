spring.application.name=backend
server.port=${SERVER_PORT:8080}

# Carrega variaveis de um .env no backend/ ou na raiz do monorepo quando existir.
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# Perfil default para execucao local; no Docker Compose usamos SPRING_PROFILES_ACTIVE=docker
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

